name: Fetch WC26 Scores

on:
  schedule:
    # Runs every 30 minutes. WC matches run ~16:00–04:00 UTC daily.
    # Client-side fetch handles live updates while the app is open;
    # this cron ensures final scores land in Firebase even when nobody
    # has the app open (e.g. 3 AM IST overnight matches).
    - cron: '*/15 * * * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  fetch-scores:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Fetch scores and write to Firebase
        env:
          FDORG_TOKEN: ${{ secrets.FDORG_TOKEN }}
        run: node .github/scripts/fetch-scores.mjs
