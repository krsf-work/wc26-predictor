name: Fetch WC26 Scores

on:
  workflow_dispatch: # manual trigger only — scores are updated by Guru in the app

jobs:
  fetch-scores:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Fetch scores and write to Firebase
        env:
          FDORG_TOKEN: ${{ secrets.FDORG_TOKEN }}
        run: node .github/scripts/fetch-scores.mjs
